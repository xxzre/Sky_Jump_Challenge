<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Jump Alien: Journey to the Stars</title>
    <meta name="description"
        content="Help the alien jump to the stars! A premium arcade journey with boost platforms and cosmic coins.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <div class="stats-container">
            <div class="stat-box">
                <span>Score:</span>
                <span id="score-value">0</span>
            </div>
            <div class="stat-box">
                <div class="coin-icon"></div>
                <span id="coin-count">0</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Start Screen -->
        <div id="start-screen" class="ui-layer">
            <div class="lang-switcher">
                <span id="lang-pt" class="lang-opt active">PT</span>
                <span id="lang-en" class="lang-opt">EN</span>
            </div>
            <h1 class="floating" data-t="title">Sky Jump</h1>
            <p data-t="subtitle">Lucky Pig's Cosmic Journey</p>
            <div class="menu-buttons">
                <button id="start-button" class="btn" data-t="play">Play Now</button>
                <button id="shop-button" class="btn secondary" data-t="shop">Item Shop</button>
            </div>
            <div class="high-score-label"><span data-t="best">Best</span>: <span id="high-score-value">0</span></div>
        </div>

        <!-- Shop Screen -->
        <div id="shop-screen" class="ui-layer hidden">
            <h1 data-t="shop_title">Alien Shop</h1>
            <div id="skin-list" class="skin-container">
                <!-- Skins will be injected here via JS -->
            </div>
            <button id="close-shop" class="btn secondary" data-t="back">Back to Menu</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="ui-layer hidden">
            <h1 data-t="game_over">Game Over</h1>
            <p id="final-score">Score: 0</p>
            <div class="menu-buttons">
                <button id="restart-button" class="btn" data-t="restart">New Flight</button>
                <button id="menu-button" class="btn secondary" data-t="menu">Main Menu</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <!-- Placeholder for music if added later -->
    </audio>

    <script src="game.js"></script>
</body>

</html>
