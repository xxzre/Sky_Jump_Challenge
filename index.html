<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalada no Dinheiro: Subida Infinita</title>
    <meta name="description"
        content="Help the alien jump to the stars! A premium arcade journey with boost platforms and cosmic coins.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <div class="stats-container">
            <div class="stat-box">
                <span>Score:</span>
                <span id="score-value">0</span>
            </div>
            <div class="stat-box">
                <div class="coin-icon"></div>
                <span id="coin-count">0</span>
            </div>
            <div class="stat-box">
                <span>Best:</span>
                <span id="high-score-game">0</span>
            </div>
        </div>

        <!-- Active Boosts HUD -->
        <div id="boosts-hud" class="boosts-hud">
            <!-- Boost icons will appear here -->
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Reward Chest Screen -->
        <div id="reward-chest-screen" class="ui-layer hidden">
            <div class="reward-content">
                <h1 id="reward-title">Baú de Recompensas</h1>
                <p id="reward-subtitle">Escolha uma opção!</p>
                <div class="reward-grid">
                    <div class="reward-slot">?</div>
                    <div class="reward-slot">?</div>
                    <div class="reward-slot">?</div>
                    <div class="reward-slot">?</div>
                    <div class="reward-slot">?</div>
                    <div class="reward-slot">?</div>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="ui-layer">
            <h1 class="floating">Escalada no Dinheiro</h1>
            <div id="lang-selector" class="lang-selector">
                <button id="btn-pt" class="lang-btn active">🇧🇷 PT</button>
                <button id="btn-en" class="lang-btn">🇺🇸 EN</button>
            </div>



            <div class="menu-buttons">
                <button id="start-btn" class="btn">Play Now</button>
                <div class="side-buttons-row">
                    <button id="shop-btn-menu" class="btn secondary">Shop</button>
                    <button id="worlds-btn-menu" class="btn secondary">Worlds</button>
                    <button id="chest-shop-btn" class="btn secondary">📦 Chests</button>
                    <button id="settings-btn-menu" class="btn secondary">⚙️</button>
                </div>
            </div>
            <div class="high-score-label"><span id="best-label">Best</span>: <span id="high-score-value">0</span></div>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen" class="ui-layer hidden">
            <h1 id="settings-title">Settings</h1>
            <div class="settings-content">
                <div class="settings-item">
                    <span id="volume-label">Volume</span>
                    <input type="range" id="volume-control" min="0" max="1" step="0.1" value="0.5">
                </div>
                <div class="settings-item">
                    <span id="controls-label">Controls</span>
                    <div class="key-mapping">
                        <div>
                            <span id="left-label">Left</span>:
                            <button id="map-left" class="key-btn">A</button>
                        </div>
                        <div>
                            <span id="right-label">Right</span>:
                            <button id="map-right" class="key-btn">D</button>
                        </div>
                    </div>
                </div>
            </div>
            <button id="close-settings" class="btn secondary">Back to Menu</button>
        </div>

        <!-- Worlds Screen -->
        <div id="worlds-screen" class="ui-layer hidden">
            <h1 id="worlds-title">Select World</h1>
            <div id="world-list" class="skin-container">
                <!-- Worlds will be injected here via JS -->
            </div>
            <button id="close-worlds" class="btn secondary">Back to Menu</button>
        </div>

        <!-- Shop Screen -->
        <div id="shop-screen" class="ui-layer hidden">
            <h1 id="shop-title">Mercado de Skins</h1>
            <div id="skin-list" class="skin-container">
                <!-- Skins will be injected here via JS -->
            </div>
            <button id="close-shop" class="btn secondary">Back to Menu</button>
        </div>

        <!-- Chest Shop Screen -->
        <div id="chest-shop-screen" class="ui-layer hidden">
            <h1 id="chest-shop-title">Loja de Baús</h1>

            <div class="menu-currency">
                <div class="stat-box">
                    <div class="coin-icon"></div>
                    <span id="menu-coin-count">0</span>
                </div>
                <div class="stat-box">
                    <div class="gem-icon">💎</div>
                    <span id="menu-gem-count">0</span>
                </div>
            </div>

            <div class="gem-conversion">
                <button id="convert-coins-btn" class="btn-buy-gem">Trocar 100 💰 por 10 💎</button>
            </div>

            <div class="chest-items">
                <div class="chest-card">
                    <div class="chest-preview">📦</div>
                    <div class="chest-info">
                        <span class="chest-name">Baú Comum</span>
                        <span class="chest-desc">Sorteie bônus ou moedas!</span>
                    </div>
                    <button id="buy-chest-btn" class="btn-buy-chest">Abrir (50 💎)</button>
                </div>
            </div>

            <button id="close-chest-shop" class="btn secondary">Voltar ao Menu</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="ui-layer hidden">
            <h1>Game Over</h1>
            <p id="final-score">Score: 0</p>
            <div class="menu-buttons">
                <button id="restart-button" class="btn">New Flight</button>
                <button id="menu-button" class="btn secondary">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Notification System -->
    <div id="notification" class="notification hidden"></div>

    <audio id="bg-music" loop>
        <!-- Placeholder for music if added later -->
    </audio>

    <script src="game.js?v=5"></script>
</body>

</html>
